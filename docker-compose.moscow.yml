services:
  browserless:
    image: browserless/chrome:latest
    container_name: telegram_bot_browserless
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=60000
      - CHROME_REFRESH_TIME=600000
      - PREBOOT_CHROME=true
      - LOG_LEVEL=info
      - DEFAULT_LAUNCH_ARGS=["--disable-logging","--disable-dev-shm-usage","--no-sandbox"]
      - KEEP_ALIVE=true
    networks:
      - moscow_network
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: telegram_bot_celery_worker
    depends_on:
      browserless:
        condition: service_started
    env_file:
      - .env
    environment:
      - PYTHONPATH=/src
      - LOG_FORMAT=json
      - DATABASE_URL=${DATABASE_URL}
      - ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
      - REMOTE_SELENIUM_URL=http://browserless:3000/webdriver
      - SERVICE_NAME=celery-worker
      - SERVER_LOCATION=moscow
      - CELERY_WORKER_MODE=1
    labels:
      logging: "promtail"
      service: "celery-worker"
      server: "moscow"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: celery -A src.parsing_movie.celery:celery_app worker --loglevel=info --concurrency=1
    volumes:
      - .:/src
    networks:
      - moscow_network
      - observability
    restart: unless-stopped

networks:
  moscow_network:
    driver: bridge
  # Подключаемся к observability, чтобы Prometheus мог собирать метрики celery_worker
  observability:
    external: true
