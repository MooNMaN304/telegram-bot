name: CI-CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_COMPOSE_VERSION: "2.24.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff pyyaml

      - name: Lint check
        run: ruff check --output-format=github .
        continue-on-error: true

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD:$PWD/src" >> $GITHUB_ENV

      - name: Run tests
        run: pytest -v --tb=short --ignore=tests/integration_tests
        continue-on-error: false

  deploy-frankfurt:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Frankfurt server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.FRANKFURT_HOST }}
          username: ${{ secrets.FRANKFURT_USER }}
          key: ${{ secrets.FRANKFURT_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying to Frankfurt ==="
            cd /root/telegram-bot

            # Pull latest code
            echo "[1/5] Pulling latest code..."
            git reset --hard HEAD
            git clean -fd
            git pull origin master

            # Free up disk space before build (предотвращает ошибки "disk is full")
            echo "[1.5/5] Cleaning up Docker cache..."
            docker system prune -af --filter "until=24h" 2>/dev/null || true

            # Fix permissions
            echo "[2/5] Fixing permissions..."
            chmod +x entrypoint.bot.sh
            chmod +x scripts/*.sh 2>/dev/null || true

            # Ensure observability network exists (для node_exporter/cadvisor)
            echo "[2.5/5] Ensuring observability network exists..."
            docker network create observability 2>/dev/null || true

            # Build and restart bot
            echo "[3/5] Building and restarting bot..."
            docker compose -f docker-compose.frankfurt.yml up -d --build

            # Start observability stack
            echo "[4/5] Starting observability stack..."
            docker compose -f docker-compose.observability.yml up -d

            # Reload Grafana dashboards (провижининг + API)
            echo "[5/5] Reloading Grafana dashboards..."
            docker compose -f docker-compose.observability.yml restart grafana
            sleep 3
            curl -s -X POST http://localhost:3000/api/admin/provisioning/dashboards/reload \
              --connect-timeout 5 || echo "Grafana API reload skipped (non-critical)"

            echo "=== Frankfurt deployment complete! ==="

  deploy-moscow:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Moscow server
        uses: appleboy/ssh-action@v1.0.0
        # === ЧТО ИСПРАВЛЕНО 1: Передаем секреты из GitHub в окружение раннера ===
        env:
          MOSCOW_DATABASE_URL: ${{ secrets.MOSCOW_DATABASE_URL }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
        # =====================================================================
        with:
          host: ${{ secrets.MOSCOW_HOST }}
          username: ${{ secrets.MOSCOW_USER }}
          key: ${{ secrets.MOSCOW_SSH_KEY }}
          envs: MOSCOW_DATABASE_URL, ADMIN_TELEGRAM_ID
          script: |
            set -e
            echo "=== Deploying to Moscow ==="
            cd /home/ubuntu/telegram-bot

            # Pull latest code
            echo "[1/4] Pulling latest code..."
            git reset --hard HEAD
            git clean -fd
            git pull origin master

            # Setup environment variables
            echo "[2/4] Setting up environment variables..."

            # === ЧТО ИСПРАВЛЕНО 2: Безопасно обновляем файл, не стирая API-ключи ===
            # Удаляем старые строки (если они были), чтобы не плодить дубликаты
            sed -i '/DATABASE_URL/d' .env 2>/dev/null || true
            sed -i '/ADMIN_TELEGRAM_ID/d' .env 2>/dev/null || true

            # Дописываем новые значения строго в конец файла через >>
            echo "DATABASE_URL=${MOSCOW_DATABASE_URL}" >> .env
            echo "ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}" >> .env
            # =====================================================================

            # Ensure observability network exists (для связи с Prometheus)
            echo "[2.5/4] Ensuring observability network exists..."
            docker network create observability 2>/dev/null || true

            # Build and restart celery worker
            echo "[3/4] Building and restarting celery worker..."
            docker compose -f docker-compose.moscow.yml up -d --build

            # Start observability stack (Prometheus, Grafana, Loki, etc.)
            echo "[3.5/4] Starting observability stack..."
            docker compose -f docker-compose.observability.yml up -d

            # Reload Grafana dashboards
            echo "[3.6/4] Reloading Grafana dashboards..."
            docker compose -f docker-compose.observability.yml restart grafana 2>/dev/null || true
            sleep 2
            curl -s -X POST http://localhost:3000/api/admin/provisioning/dashboards/reload \
              --connect-timeout 5 || echo "Grafana API reload skipped (non-critical)"

            # Start Promtail for log collection (если observability.yml не запустил)
            echo "[4/4] Ensuring Promtail for log shipping..."
            if ! docker ps --format '{{.Names}}' | grep -q promtail; then
              docker run -d --name promtail-moscow \
                -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(pwd)/observability/promtail/promtail-moscow.yaml:/etc/promtail/config.yml \
                --network host \
                grafana/promtail:2.9.2 -config.file=/etc/promtail/config.yml
            fi

            echo "=== Moscow deployment complete! ==="
