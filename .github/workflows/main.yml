name: CI-CD Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run tests
        run: pytest

  deploy-frankfurt:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Frankfurt
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.FRANKFURT_HOST }}
          username: ${{ secrets.FRANKFURT_USER }}
          key: ${{ secrets.FRANKFURT_SSH_KEY }}
          script: |
            cd /root/telegram-bot
            git pull origin main
            docker-compose -f docker-compose.frankfurt.yml up -d --build
            docker-compose -f docker-compose.observability.yml up -d

  deploy-moscow:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to Moscow
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.MOSCOW_HOST }}
          username: ${{ secrets.MOSCOW_USER }}
          key: ${{ secrets.MOSCOW_SSH_KEY }}
          script: |
            cd /home/ubuntu/telegram-bot
            git pull origin main
            docker-compose -f docker-compose.moscow.yml up -d --build
            docker stop promtail || true
            docker rm promtail || true
            docker run -d --name promtail \
              -v /var/lib/docker/containers:/var/lib/docker/containers:ro \
              -v $(pwd)/promtail-config.moscow.yml:/etc/promtail/config.yml \
              --network host \
              grafana/promtail:2.9.1 -config.file=/etc/promtail/config.yml