name: CI-CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DOCKER_COMPOSE_VERSION: "2.24.0"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov ruff pyyaml

      - name: Lint check
        run: ruff check --output-format=github .
        continue-on-error: true

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD:$PWD/src" >> $GITHUB_ENV

      - name: Run tests
        run: pytest -v --tb=short --ignore=tests/integration_tests
        continue-on-error: false

  deploy-frankfurt:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Frankfurt server
        uses: appleboy/ssh-action@v1.0.0
        env:
          MOSCOW_HOST: ${{ secrets.MOSCOW_HOST }}
        with:
          host: ${{ secrets.FRANKFURT_HOST }}
          username: ${{ secrets.FRANKFURT_USER }}
          key: ${{ secrets.FRANKFURT_SSH_KEY }}
          envs: MOSCOW_HOST
          script: |
            set -e
            echo "=== Deploying to Frankfurt ==="
            cd /root/telegram-bot

            # Pull latest code
            echo "[1/7] Pulling latest code..."
            git reset --hard HEAD
            git clean -fd
            git pull origin master

            # Free up disk space before build (предотвращает ошибки "disk is full")
            echo "[1.5/7] Cleaning up Docker cache..."
            docker system prune -af --filter "until=24h" 2>/dev/null || true

            # Fix permissions
            echo "[2/7] Fixing permissions..."
            chmod +x entrypoint.bot.sh
            chmod +x scripts/*.sh 2>/dev/null || true

            # Generate prometheus.yml from template (подставляем IP московского сервера)
            echo "[2.5/7] Generating prometheus.yml (MOSCOW_HOST=${MOSCOW_HOST})..."
            sed "s/\${MOSCOW_SERVER_IP}/${MOSCOW_HOST}/g" \
              observability/prometheus/prometheus.yml.template \
              > observability/prometheus/prometheus.yml

            # Ensure observability network exists (для node_exporter/cadvisor)
            echo "[3/7] Ensuring observability network exists..."
            docker network create observability 2>/dev/null || true

            # Build and restart bot
            echo "[4/7] Building and restarting bot..."
            docker compose -f docker-compose.frankfurt.yml up -d --build

            # Start observability stack
            echo "[5/7] Starting observability stack..."
            docker compose -f docker-compose.observability.yml up -d

            # Reload Grafana dashboards (провижининг + API)
            echo "[6/7] Reloading Grafana dashboards..."
            docker compose -f docker-compose.observability.yml restart grafana
            sleep 3
            curl -s -X POST http://localhost:3000/api/admin/provisioning/dashboards/reload \
              --connect-timeout 5 || echo "Grafana API reload skipped (non-critical)"

            echo "=== Frankfurt deployment complete! ==="

  deploy-moscow:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Moscow server
        uses: appleboy/ssh-action@v1.0.0
        env:
          MOSCOW_DATABASE_URL: ${{ secrets.MOSCOW_DATABASE_URL }}
          ADMIN_TELEGRAM_ID: ${{ secrets.ADMIN_TELEGRAM_ID }}
          FRANKFURT_HOST: ${{ secrets.FRANKFURT_HOST }}
        with:
          host: ${{ secrets.MOSCOW_HOST }}
          username: ${{ secrets.MOSCOW_USER }}
          key: ${{ secrets.MOSCOW_SSH_KEY }}
          timeout: 10m
          envs: MOSCOW_DATABASE_URL, ADMIN_TELEGRAM_ID, FRANKFURT_HOST
          script: |
            set -e
            echo "=== Deploying to Moscow ==="
            cd /home/ubuntu/telegram-bot

            # Pull latest code
            echo "[1/5] Pulling latest code..."
            git reset --hard HEAD
            git clean -fd
            git pull origin master

            # Setup environment variables
            echo "[2/5] Setting up environment variables..."
            sed -i '/DATABASE_URL/d' .env 2>/dev/null || true
            sed -i '/ADMIN_TELEGRAM_ID/d' .env 2>/dev/null || true
            echo "DATABASE_URL=${MOSCOW_DATABASE_URL}" >> .env
            echo "ADMIN_TELEGRAM_ID=${ADMIN_TELEGRAM_ID}" >> .env

            # Free up disk space before build
            echo "[2.5/5] Cleaning up Docker cache..."
            docker system prune -af --filter "until=24h" 2>/dev/null || true

            # Build and restart celery worker
            echo "[3/5] Building and restarting celery worker..."
            docker compose -f docker-compose.moscow.yml up -d --build

            # Start lightweight observability (node_exporter + cadvisor + promtail)
            echo "[4/5] Starting lightweight observability stack..."
            docker compose -f docker-compose.observability-moscow.yml up -d

            # Update promtail config to point to Frankfurt Loki
            echo "[4.5/5] Configuring Promtail → Frankfurt Loki (${FRANKFURT_HOST})..."
            sed -i "s|http://[^:]*:3100/loki|http://${FRANKFURT_HOST}:3100/loki|g" \
              observability/promtail/promtail-moscow.yaml 2>/dev/null || true
            docker compose -f docker-compose.observability-moscow.yml restart promtail 2>/dev/null || true

            echo "=== Moscow deployment complete! ==="
