# Prometheus config for scraping bot, celery, node, and docker metrics
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Telegram Bot (Frankfurt) — метрики :8000/metrics
  - job_name: "telegram-bot"
    static_configs:
      - targets: ["telegram_bot_app:8000"]
        labels:
          service: "telegram-bot"
          server_location: "frankfurt"

  # 🖥 Метрики сервера (CPU, RAM, диск)
  - job_name: "node"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          server_location: "frankfurt"

  # 📦 Метрики Docker контейнеров
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          server_location: "frankfurt"

  # ===== CELERY WORKER (Frankfurt) =====
  - job_name: "celery-worker"
    static_configs:
      - targets: ["celery_worker:8001"]
        labels:
          service: "celery-worker"
          server_location: "frankfurt"

  # ===== MOSCOW SERVER =====
  # Celery worker из docker-compose.moscow.yml, подключен к observability сети
  - job_name: "celery-worker-moscow"
    static_configs:
      - targets: ["celery_worker:8001"]
        labels:
          service: "celery-worker"
          server_location: "moscow"

  # node_exporter и cadvisor из docker-compose.observability.yml
  # на московском сервере — те же имена контейнеров, что и на франкфуртском
  - job_name: "node-moscow"
    static_configs:
      - targets: ["node_exporter:9100"]
        labels:
          server_location: "moscow"

  - job_name: "cadvisor-moscow"
    static_configs:
      - targets: ["cadvisor:8080"]
        labels:
          server_location: "moscow"
