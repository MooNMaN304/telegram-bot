server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # ============================================================
  # Docker container logs (наши приложения: bot, celery и т.д.)
  # ============================================================
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: "container"
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: "stream"
      - source_labels: ["__meta_docker_container_label_service"]
        regex: "(.+)"
        target_label: "service"
      - source_labels: ["__meta_docker_container_label_server"]
        regex: "(.+)"
        target_label: "server_location"
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: name
            message: message
            timestamp: asctime
            service_name: service_name
            server_location: server_location
      - labels:
          level:
          logger:
          service_name:
          server_location:

  # ============================================================
  # 📋 Системные логи сервера (syslog/journal)
  # Для диагностики что именно грузит CPU
  # ============================================================
  - job_name: system_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          server_location: frankfurt
          __path__: /var/log/syslog
      - targets:
          - localhost
        labels:
          job: docker_daemon
          server_location: frankfurt
          __path__: /var/log/docker.log
      - targets:
          - localhost
        labels:
          job: kern
          server_location: frankfurt
          __path__: /var/log/kern.log
      - targets:
          - localhost
        labels:
          job: dmesg
          server_location: frankfurt
          __path__: /var/log/dmesg
    pipeline_stages:
      - multiline:
          firstline: '^\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2}'
          max_wait_time: 3s
