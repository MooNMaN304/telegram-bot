services:
  postgres:
    image: postgres:16
    container_name: cinema-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cinema_user
      POSTGRES_PASSWORD: cinema_pass
      POSTGRES_DB: cinema_db
    command:
      - "postgres"
      - "-c"
      - "listen_addresses=*"
      - "-c"
      - "max_connections=200"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cinema_user -d cinema_db" ]
      interval: 30s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - frankfurt_network
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 160M

  redis:
    image: redis:7-alpine
    container_name: telegram_bot_redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass Kolbasko753
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "Kolbasko753", "ping" ]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - frankfurt_network
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 24M
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    entrypoint: [ "/src/entrypoint.bot.sh" ]
    container_name: telegram_bot_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PYTHONPATH=/src
      - LOG_FORMAT=json
      - SERVICE_NAME=telegram-bot
      - SERVER_LOCATION=frankfurt
      - METRICS_PORT=8000
    labels:
      logging: "promtail"
      service: "telegram-bot"
      server: "frankfurt"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - .:/src
    networks:
      - frankfurt_network
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.20"
          memory: 128M
    restart: unless-stopped

networks:
  frankfurt_network:
    driver: bridge
  # Сеть observability создаётся CI/CD: docker network create observability
  # external: true чтобы не конфликтовать с labels от observability compose
  observability:
    external: true

volumes:
  postgres_data:
