version: "3.8"

services:
  loki:
    image: grafana/loki:2.9.2
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yaml
    volumes:
      - ./observability/loki/loki-config.yaml:/etc/loki/loki-config.yaml
      - loki_data:/loki
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.2
    container_name: promtail
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ./observability/promtail/promtail-frankfurt.yaml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.03"
          memory: 24M
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 96M
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_PROVISIONING_DASHBOARDS_AUTO_RELOAD=true
    volumes:
      - grafana_storage:/var/lib/grafana
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./observability/grafana/dashboards:/etc/grafana/provisioning/dashboards
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.10"
          memory: 64M
    restart: unless-stopped

  # ============================================================
  # 🖥 Мониторинг сервера (CPU, RAM, диск)
  # ============================================================
  node_exporter:
    image: prom/node-exporter:v1.8.0
    container_name: node_exporter
    ports:
      - "9100:9100"
    command:
      - "--path.rootfs=/host"
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    networks:
      - observability
    deploy:
      resources:
        limits:
          cpus: "0.03"
          memory: 24M
    restart: unless-stopped

  # ============================================================
  # 📦 Мониторинг Docker контейнеров
  # ⚠️ cadvisor опрашивает Docker API — может нагружать dockerd!
  # Если dockerd жрёт CPU — уменьшите scrape_interval или уберите cadvisor.
  # ============================================================
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    ports:
      - "8080:8080"
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - observability
    # ⚠️ cadvisor store_interval — уменьшаем нагрузку на dockerd
    command: >
      --docker_only=true
      --store_interval=30s
      --housekeeping_interval=60s
    deploy:
      resources:
        limits:
          cpus: "0.05"
          memory: 32M
    restart: unless-stopped

networks:
  observability:
    driver: bridge

volumes:
  loki_data:
  prometheus_data:
  grafana_storage:
